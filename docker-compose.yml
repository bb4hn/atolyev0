services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lastik-market
    expose:
      - "80"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lastik-market.rule=Host(`v0.batuhanozen.com`)"
      - "traefik.http.routers.lastik-market.entrypoints=websecure"
      - "traefik.http.routers.lastik-market.tls.certResolver=letsencrypt"
      - "traefik.http.services.lastik-market.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
